<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Login - Quizee By Nisar Ali</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    
    <div class="auth-wrapper">
        <div class="auth-sidebar" style="background: linear-gradient(135deg, #1e293b, #0f172a);">
            <i class="fa-solid fa-shield-halved fa-5x" style="color: var(--primary-color); margin-bottom: 1rem;"></i>
            <h1>Super Admin</h1>
            <p>Quizee By Nisar Ali</p>
            <p style="font-size: 1rem; margin-top: 1rem; color: rgba(255,255,255,0.7);">Highest Level System Access</p>
        </div>
        
        <div class="auth-main">
            <div class="auth-card fade-in">
                
                <div style="text-align: center; margin-bottom: 2rem;">
                    <h2>System Administration</h2>
                    <p>Enter your credentials to access the control panel.</p>
                </div>

                <form id="form-admin-login" onsubmit="handleAdminLogin(event)">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" id="adminUser" class="form-control" required placeholder="e.g. Nisar Ali">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="adminPass" class="form-control" required placeholder="••••••••">
                    </div>
                    <div id="loginError" style="color: var(--danger-color); margin-bottom: 1rem; display: none; font-size: 0.9rem; text-align: center;">
                        Invalid credentials.
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; background-color: var(--text-primary);">
                        <i class="fa-solid fa-lock"></i> Secure Login
                    </button>
                </form>

                <div style="text-align: center; margin-top: 2rem;">
                    <a href="../index.html" style="color: var(--text-secondary); font-size: 0.9rem;"><i class="fa-solid fa-arrow-left"></i> Back to Main Portal</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="../js/db.js"></script>
    <script>
        async function handleAdminLogin(e) {
            e.preventDefault();
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;

            // Admin seeded email is "Nisar Ali", so this matches verifyLogin logic
            const admin = await db.verifyLogin(user, pass);

            if (admin && admin.role === 'admin') {
                db.setSession(admin);
                await db.logActivity(admin.name, 'Super Admin', 'Account Login');
                window.location.href = 'admin-dashboard.html';
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }
    </script>
</body>
</html>
