<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Assessment - Quizee By Nisar Ali</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: var(--bg-color);
            min-height: 100vh;
        }

        /* ── Outer wrapper ── */
        .quiz-wrapper {
            max-width: 1280px;
            margin: 2rem auto;
            padding: 0 1.5rem 2rem;
        }

        /* ─────────────────────────────────
           TOP RIBBON  (header + progress)
        ───────────────────────────────── */
        .quiz-header {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
            color: white;
            padding: 1.25rem 2rem;
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
            box-shadow: var(--shadow-lg);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .timer {
            font-size: 1.15rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(0,0,0,0.2);
            padding: 0.5rem 1rem;
            border-radius: 20px;
        }

        .timer.warning {
            color: #ffcccc;
            animation: pulse-red 1s infinite;
        }

        @keyframes pulse-red {
            0%   { background: rgba(0,0,0,0.2); }
            50%  { background: rgba(239, 68, 68, 0.4); }
            100% { background: rgba(0,0,0,0.2); }
        }

        .progress-bar-container {
            background: var(--surface-color);
            padding: 0.85rem 2rem;
            border: 1px solid var(--border-color);
            border-top: none;
            border-radius: 0 0 var(--radius-xl) var(--radius-xl);
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-lg);
        }

        .progress-bar-bg {
            height: 8px;
            background: var(--border-color);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--success-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        /* ─────────────────────────────────
           SIDE-BY-SIDE CONTENT AREA
        ───────────────────────────────── */
        .quiz-content-row {
            display: flex;
            gap: 1.5rem;
            align-items: flex-start;
        }

        /* ── LEFT: Scenario column ── */
        .scenario-column {
            flex: 0 0 45%;
            display: none;          /* shown by JS when a scenario exists */
        }

        .scenario-card {
            background: var(--surface-color);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }

        .scenario-card-header {
            background: rgba(79,70,229,0.08);
            border-bottom: 1px solid var(--border-color);
            padding: 0.9rem 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #scenarioText {
            padding: 1.25rem;
            font-size: 0.97rem;
            line-height: 1.8;
            color: var(--text-primary);
            overflow-y: auto;
            max-height: 70vh;
        }

        #scenarioText img {
            max-width: 100%;
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin-top: 0.75rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.08);
            display: block;
        }

        /* ── RIGHT: Question column ── */
        .question-column {
            flex: 1 1 55%;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* When there is NO scenario, question takes full width */
        .question-column.full-width {
            flex: 1 1 100%;
        }

        /* Question card – JS renders #quizBody's innerHTML inside this */
        .question-card {
            background: var(--surface-color);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            padding: 2rem;
        }

        .question-meta {
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 0.75rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .question-text {
            font-size: 1.25rem;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
            font-weight: 600;
            line-height: 1.5;
        }

        .options-grid {
            display: grid;
            gap: 0.85rem;
        }

        .option-card {
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1rem 1.2rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1rem;
            color: var(--text-primary);
        }

        .option-card:hover {
            border-color: var(--primary-color);
            background: rgba(79, 70, 229, 0.05);
        }

        .option-card.selected {
            border-color: var(--primary-color);
            background: rgba(79, 70, 229, 0.1);
        }

        .option-letter {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--text-secondary);
            transition: var(--transition);
            flex-shrink: 0;
        }

        .option-card.selected .option-letter {
            background: var(--primary-color);
            color: white;
        }

        /* ── Navigation footer card ── */
        .quiz-footer {
            background: var(--surface-color);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            padding: 1.25rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
        }

        #saveNotice {
            font-size: 0.85rem;
            color: var(--text-secondary);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="quiz-wrapper">

        <!-- ══════════════════════════
             TOP RIBBON (full width)
        ══════════════════════════ -->
        <div class="quiz-header">
            <div>
                <h2 style="margin:0; font-size:1.25rem;">General Science Quiz</h2>
                <p style="margin:0; font-size:0.9rem; opacity:0.9;">Grade 5 - Section A</p>
            </div>
            <div style="display:flex; gap:1rem; align-items:center;">
                <button class="btn-icon" style="color:white; background:rgba(255,255,255,0.2);"
                        onclick="toggleFullscreen()" title="Fullscreen">
                    <i class="fa-solid fa-expand"></i>
                </button>
                <div class="timer" id="quizTimer">
                    <i class="fa-solid fa-clock"></i>
                    <span id="timeDisplay">15:00</span>
                </div>
            </div>
        </div>

        <!-- Progress bar (full width) -->
        <div class="progress-bar-container">
            <div style="display:flex; justify-content:space-between; margin-bottom:0.4rem; font-size:0.88rem;">
                <span style="color:var(--text-secondary);" id="progressText">Question 1 of 10</span>
                <span style="color:var(--text-secondary);"><i id="saveNotice">Autosaved just now</i></span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>
        </div>

        <!-- ══════════════════════════
             SIDE-BY-SIDE CONTENT
        ══════════════════════════ -->
        <div class="quiz-content-row">

            <!-- LEFT: Scenario card (hidden until JS reveals it) -->
            <div class="scenario-column" id="scenarioPanel">
                <div class="scenario-card">
                    <div class="scenario-card-header">
                        <strong style="color:var(--primary-color);">
                            <i class="fa-solid fa-book-open"></i> Reading Passage / Scenario
                        </strong>
                        <button onclick="toggleScenario()" class="btn-icon"
                                id="scenarioToggleBtn" title="Collapse">
                            <i class="fa-solid fa-chevron-up" id="scenarioChevron"></i>
                        </button>
                    </div>
                    <div id="scenarioText"></div>
                </div>
            </div>

            <!-- RIGHT: Question + navigation -->
            <div class="question-column full-width" id="questionColumn">

                <!-- Question card (JS writes into #quizBody) -->
                <div class="question-card" id="quizBody">
                    <!-- Dynamically rendered -->
                </div>

                <!-- Nav footer -->
                <div class="quiz-footer">
                    <button class="btn btn-secondary" id="btnPrev"
                            onclick="prevQuestion()" disabled>
                        <i class="fa-solid fa-arrow-left"></i> Previous
                    </button>
                    <div class="nav-buttons">
                        <button class="btn btn-primary" id="btnNext" onclick="nextQuestion()">
                            Next <i class="fa-solid fa-arrow-right"></i>
                        </button>
                        <button class="btn btn-primary" id="btnSubmit" onclick="submitQuiz()"
                                style="display:none; background-color:var(--success-color);">
                            Submit Quiz <i class="fa-solid fa-check"></i>
                        </button>
                    </div>
                </div>

            </div><!-- /question-column -->

        </div><!-- /quiz-content-row -->

    </div><!-- /quiz-wrapper -->

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="../js/db.js"></script>
    <script src="../js/quiz.js"></script>
</body>
</html>
